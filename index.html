<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>狼吃小羊游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>狼吃小羊</h1>
        
        <div class="game-info">
            <div class="player-info">
                <div id="current-player">当前玩家: 狼</div>
                <div id="game-status">游戏状态: 准备开始</div>
            </div>
            <div class="game-controls">
                <button id="start-btn">开始游戏</button>
                <button id="stop-btn">停止游戏</button>
                <button id="reset-btn">重新开始</button>
                <button id="surrender-btn">认输</button>
            </div>
        </div>
        
        <div class="board-container">
            <div id="board">
                <!-- 棋盘交叉点将由JavaScript生成 -->
            </div>
        </div>
        
        <div class="piece-info">
            <div class="piece wolf">
                <div class="piece-icon">🐺</div>
                <div class="piece-name">狼</div>
                <div class="piece-count">剩余: <span id="wolf-count">3</span></div>
            </div>
            <div class="piece sheep">
                <div class="piece-icon">🐑</div>
                <div class="piece-name">羊</div>
                <div class="piece-count">剩余: <span id="sheep-count">15</span></div>
            </div>
        </div>
        
        <div class="game-rules">
            <h3>游戏规则</h3>
            <ul>
                <li>狼和羊在一条直线上，只有狼和羊的中间有一个空位狼才可以吃掉羊</li>
                <li>狼吃掉羊后，狼要在羊所在的位置，如果不吃羊则只能走一格</li>
                <li>狼在游戏框架内可以上下左右的直线都可以吃羊</li>
                <li>羊每次只能走一格，不能跳过狼或者羊</li>
                <li>狼数量为3，羊数量为15</li>
                <li>狼先手，然后交替走棋</li>
                <li>狼把羊吃光为狼胜</li>
                <li>狼被围死无法移动为羊胜</li>
            </ul>
        </div>
    </div>
    
    <div id="message-box" class="message-box">
        <div class="message-content">
            <h2 id="message-title">游戏开始</h2>
            <p id="message-text">狼先手，请开始游戏！</p>
            <button id="message-btn">确定</button>
        </div>
    </div>
    
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
